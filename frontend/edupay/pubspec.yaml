name: edupay_app
description: A Flutter frontend for EduPay school management app with AI assistant.
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  http: ^1.2.1
  web_socket_channel: ^3.0.3
  stomp_dart_client: ^3.0.1

  # State Management
  flutter_riverpod: ^2.5.0

  # AI Chat UI
  flutter_markdown: ^0.7.0
  animated_text_kit: ^4.2.0

  # Local Storage
  shared_preferences: ^2.2.3

  # UI Enhancements
  google_fonts: ^6.2.0
  cupertino_icons: ^1.0.8

  # Date Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
